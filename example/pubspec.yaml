name: mpv_audio_kit_example
description: "A minimal example for the mpv_audio_kit plugin."
# Prevents accidental publication of the example to pub.dev.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  mpv_audio_kit:
    # In a real app depend on a published version (mpv_audio_kit: ^x.y.z).
    # The bundled example uses a path dependency on the plugin it ships with.
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
