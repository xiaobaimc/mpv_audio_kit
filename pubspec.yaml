name: mpv_audio_kit
description: Dart audio player built on mpv. Supports audio filters, equalizer, visualizer, waveform and more. Targets macOS, Windows, Linux, iOS and Android.
version: 0.3.0
homepage: https://github.com/ales-drnz/mpv_audio_kit
repository: https://github.com/ales-drnz/mpv_audio_kit
issue_tracker: https://github.com/ales-drnz/mpv_audio_kit/issues

topics:
  - cross-platform
  - audio-player
  - libmpv
  - ffmpeg
  - dsp

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

screenshots:
  - description: 'The mpv_audio_kit package logo.'
    path: imgs/mpv_audio_kit.png
  - description: 'Audio player with a waveform seekbar and a live mpv log console.'
    path: imgs/desktop_player_console.gif
  - description: 'Settings grid exposing every mpv audio subsystem.'
    path: imgs/desktop_settings_grid.png
  - description: 'Now-playing screen with cover art and a waveform seekbar.'
    path: imgs/mobile_player.png
  - description: 'Playlist queue screen.'
    path: imgs/mobile_queue.png
  - description: 'DSP audio-effects screen.'
    path: imgs/mobile_filters.png
  - description: 'Audio hardware and output routing screen.'
    path: imgs/mobile_audio_hardware.png

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'

dependencies:
  crypto: ^3.0.0
  ffi: ^2.1.3
  fftea: ^1.5.0
  flutter:
    sdk: flutter
  meta: ^1.15.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  test: ^1.25.0

flutter:
  plugin:
    platforms:
      android:
        package: com.alesdrnz.mpv_audio_kit
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      ios:
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      windows:
        ffiPlugin: true
  # CA certificate bundle used for `https://` peer verification on
  # platforms whose OS trust store is not reachable from native code.
  # Auto-extracted to a real filesystem path at player construction.
  assets:
    - lib/assets/cacert.pem