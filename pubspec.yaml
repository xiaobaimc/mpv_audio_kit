name: mpv_audio_kit
description: "Flutter audio player built on top of libmpv. Supports audio filters, pitch control, equalizer, and all mpv audio features. Targets macOS, Windows, Linux, iOS and Android."
version: 0.2.1
homepage: https://github.com/ales-drnz/mpv_audio_kit
repository: https://github.com/ales-drnz/mpv_audio_kit
issue_tracker: https://github.com/ales-drnz/mpv_audio_kit/issues

topics:
  - cross-platform
  - audio-player
  - libmpv
  - ffmpeg
  - dsp

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

screenshots:
  - description: 'The mpv_audio_kit package logo.'
    path: imgs/mpv_audio_kit.png
  - description: 'Desktop demo app: the audio player with a waveform seekbar and a live mpv log console.'
    path: imgs/desktop_player_console.gif
  - description: 'Desktop demo app: the settings grid exposing every mpv audio subsystem.'
    path: imgs/desktop_settings_grid.png
  - description: 'Mobile demo app: the now-playing screen with cover art and a waveform seekbar.'
    path: imgs/mobile_player.png
  - description: 'Mobile demo app: the playlist queue screen.'
    path: imgs/mobile_queue.png
  - description: 'Mobile demo app: the DSP audio-effects screen.'
    path: imgs/mobile_filters.png
  - description: 'Mobile demo app: the audio hardware and output routing screen.'
    path: imgs/mobile_audio_hardware.png

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  ffi: ^2.1.3
  meta: ^1.15.0
  fftea: ^1.5.0
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.25.0

flutter:
  plugin:
    platforms:
      android:
        package: com.alesdrnz.mpv_audio_kit
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      ios:
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      windows:
        ffiPlugin: true
  # CA certificate bundle used for `https://` peer verification on
  # platforms whose OS trust store is not reachable from native code.
  # Auto-extracted to a real filesystem path at player construction.
  assets:
    - lib/assets/cacert.pem