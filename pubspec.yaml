name: mpv_audio_kit
description: Dart audio player built on mpv v0.41.0. Supports audio filters, equalizer, visualizer, waveform and more. Targets macOS, Windows, Linux, iOS and Android.
version: 0.4.0
homepage: https://github.com/ales-drnz/mpv_audio_kit
repository: https://github.com/ales-drnz/mpv_audio_kit
issue_tracker: https://github.com/ales-drnz/mpv_audio_kit/issues

topics:
  - cross-platform
  - audio-player
  - libmpv
  - ffmpeg
  - dsp

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

screenshots:
  - description: 'The mpv_audio_kit package logo.'
    path: imgs/mpv_audio_kit.png

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'

dependencies:
  ffi: ^2.1.3
  fftea: ^1.5.0
  flutter:
    sdk: flutter
  meta: ^1.15.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  test: ^1.25.0

flutter:
  plugin:
    platforms:
      android:
        package: com.alesdrnz.mpv_audio_kit
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      ios:
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      linux:
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      macos:
        pluginClass: MpvAudioKitPlugin
        ffiPlugin: true
      windows:
        pluginClass: MpvAudioKitPluginCApi
        ffiPlugin: true